name: deploy

on:
  push:
    branches: [master]

permissions: {}

# デプロイは直列化し、後続のデプロイをキャンセルしない。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    # seminar上のセルフホストランナーで実行し、
    # 配信ディレクトリへ直接rsyncする。
    # ランナー定義はdotfilesのnixos/host/seminar/github-runner/にある。
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read # リポジトリコンテンツの読み取り
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # git lfsがマシンに存在しているだけだと`git lfs pull`がスキップされるためセットアップを実行。
      - run: git lfs install
      # checkoutの`lfs: true`はworktree展開前に`git lfs fetch`を実行するため、
      # `.lfsconfig`のForgejo向けURLが読まれずGitHubのLFSエンドポイントに向かって404になる。
      # checkout後に手動でpullすれば`.lfsconfig`が有効になる。
      - run: git lfs pull
      # --chmodで全ファイルをworld-readableに正規化する。
      # checkoutされたファイルはランナーのumaskに依存したパーミッションになっていて、
      # そのままだとCaddyが読み取れないことがある。
      # どうせ全世界に公開するファイルなので雑に755/644で問題ない。
      - run: rsync --checksum --archive --delete --chmod=D755,F644 public/ /mnt/noa/cdn.ncaq.net/
